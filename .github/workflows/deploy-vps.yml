name: Deploy landing su VPS (Nginx via SSH)

# Pubblica il sito su un server proprio (VPS con Nginx) via SSH+rsync,
# ogni volta che si aggiorna il branch main.
# In alternativa a GitHub Pages: vedi README §5.
on:
  push:
    branches: [main]
  workflow_dispatch:   # permette anche l'avvio manuale dalla tab "Actions"

# Evita deploy sovrapposti sullo stesso server
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Prepara la chiave SSH e il known_hosts
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Rimuove spazi/newline/CR eventualmente incollati nei segreti
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          VPS_PORT="$(printf '%s' "$VPS_PORT" | tr -d '[:space:]')"
          # Se non è impostata la porta, usa la 22 di default
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizza i file sul server (rsync)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}
        run: |
          # Rimuove eventuali spazi/newline/CR dai segreti: un solo carattere
          # a-capo (facile da incollare per errore) spezza il comando remoto e
          # fa fallire rsync con "bash: line 2: /: Is a directory" (exit 126).
          VPS_HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          VPS_USER="$(printf '%s' "$VPS_USER" | tr -d '[:space:]')"
          VPS_PORT="$(printf '%s' "$VPS_PORT" | tr -d '[:space:]')"
          VPS_TARGET_DIR="$(printf '%s' "$VPS_TARGET_DIR" | tr -d '[:space:]')"

          # --delete: rimuove sul server i file non più presenti nel repo
          # gli --exclude tengono fuori tutto ciò che non fa parte del sito
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${VPS_PORT:-22}" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            ./ "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/"
